name: Temporary MATDOG NormaCore Offline Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  normacore-rust-gate:
    name: NormaCore Rust tests and Station build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MATDOG NormaCore branch
        uses: actions/checkout@v4
        with:
          repository: MattRobotics/norma-core
          ref: matdog/native-calibrator-foundation
          path: norma-core

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.97.1
        with:
          components: rustfmt

      - name: Prepare output directory
        run: mkdir -p ci-output/formatted

      - name: Enforce MATDOG RAM-only source contract
        working-directory: norma-core
        shell: bash
        run: |
          set -euo pipefail
          file=software/drivers/st3215/src/auto_calibrate/matdog.rs
          if grep -nE 'EepromRegister::|reg_write:[[:space:]]*Some|reset:[[:space:]]*Some|freeze_calibration:[[:space:]]*Some|action:[[:space:]]*Some|Offset\.address' "$file"; then
            echo "Forbidden EEPROM/reset/offset/action/freeze operation found in MATDOG path"
            exit 1
          fi
          grep -q 'PresentCurrent => ' software/drivers/st3215/src/protocol/memory.rs
          grep -q 'get_motor_current' "$file"
          grep -q 'MATDOG_MOTOR_IDS' "$file"
          grep -q 'M12_MIN_GUARD_TICK' "$file"

      - name: Apply rustfmt and capture diagnostics
        continue-on-error: true
        working-directory: norma-core
        shell: bash
        run: |
          set -o pipefail
          cargo fmt --all 2>&1 | tee ../ci-output/rustfmt.log
          fmt_rc=${PIPESTATUS[0]}
          git diff --binary > ../ci-output/rustfmt.patch || true
          cp software/drivers/st3215/src/auto_calibrate/mod.rs ../ci-output/formatted/mod.rs
          cp software/drivers/st3215/src/auto_calibrate/matdog.rs ../ci-output/formatted/matdog.rs
          cp software/drivers/st3215/src/auto_calibrate/matdog_test.rs ../ci-output/formatted/matdog_test.rs
          exit "$fmt_rc"

      - name: ST3215 unit tests
        continue-on-error: true
        working-directory: norma-core
        shell: bash
        run: |
          set -o pipefail
          cargo test --package st3215 2>&1 | tee ../ci-output/st3215-tests.log

      - name: Station release build
        continue-on-error: true
        working-directory: norma-core
        shell: bash
        run: |
          set -o pipefail
          cargo build --release --package station 2>&1 | tee ../ci-output/station-build.log

      - name: Upload offline gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matdog-normacore-offline-gate
          path: ci-output/
