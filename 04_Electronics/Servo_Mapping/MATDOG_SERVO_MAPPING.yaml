calibration_rules:
  - Do not use Station generic Calibrate for MATDOG kinematic calibration.
  - Record encoder zero only in the approved mechanical zero pose.
  - Determine direction with one joint at a time and low-energy movement.
  - Determine software limits from measured mechanical limits.
  - Update this file only after a documented validation test.
